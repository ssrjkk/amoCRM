version: "3.9"

services:
  # === PostgreSQL ===
  postgres:
    image: postgres:15-alpine
    profiles: [db, api, all]
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: amocrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d amocrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Kafka ===
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    profiles: [kafka, all]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    profiles: [kafka, all]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s

  # === Selenium Grid ===
  selenium-hub:
    image: selenium/hub:4.18
    profiles: [ui, all]
    ports:
      - "4444:4444"
    environment:
      GRID_MAX_SESSION: 10
      GRID_BROWSER_TIMEOUT: 300
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/status"]
      interval: 30s

  chrome:
    image: selenium/node-chrome:4.18
    profiles: [ui, all]
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
    shm_size: '2gb'

  firefox:
    image: selenium/node-firefox:4.18
    profiles: [ui, all]
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
    shm_size: '2gb'

  edge:
    image: selenium/node-edge:4.18
    profiles: [ui, all]
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443

  # === Elasticsearch + Kibana ===
  elasticsearch:
    image: elasticsearch:8.12.0
    profiles: [logs, all]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s

  kibana:
    image: kibana:8.12.0
    profiles: [logs, all]
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s

  # === Mock API (WireMock) ===
  wiremock:
    image: wiremock/wiremock:3.0
    profiles: [api, all]
    ports:
      - "8080:8080"
    volumes:
      - ./infra/mappings:/home/wiremock/mappings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin"]
      interval: 15s

  # === Health Check Script ===
  wait-for-services:
    image: busybox
    profiles: [api, all]
    command: ["sh", "-c", "echo 'Services ready'"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  es_data: